<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saravana — AI Portfolio Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9a;
    --text: #e8e8f0;
    --text-muted: #7a7a9a;
    --user-bubble: #1e1a3a;
    --bot-bubble: #141420;
    --glow: rgba(124, 106, 255, 0.15);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,106,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }

  @keyframes drift {
    to { transform: translate(300px, 200px); }
  }

  .layout {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 780px;
    margin: 0 auto;
    padding: 0 16px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .avatar {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    position: relative;
  }

  .avatar::after {
    content: '';
    position: absolute;
    bottom: -2px; right: -2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #22dd88;
    border: 2px solid var(--bg);
  }

  .header-info h1 {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-info p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #22dd88;
    background: rgba(34, 221, 136, 0.08);
    border: 1px solid rgba(34, 221, 136, 0.2);
    padding: 4px 10px;
    border-radius: 20px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22dd88;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Welcome state */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    gap: 20px;
    padding: 40px 0;
    animation: fadeUp 0.6s ease both;
  }

  .welcome-icon {
    width: 64px; height: 64px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 40px var(--glow);
  }

  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Welcome input box */
  .welcome-input-wrap {
    width: 100%;
    max-width: 520px;
  }

  .welcome-input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }

  .welcome-input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .welcome-input-row textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'DM Mono', monospace;
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.5;
    min-height: 24px;
    max-height: 120px;
    overflow-y: auto;
    scrollbar-width: none;
  }

  .welcome-input-row textarea::placeholder { color: var(--text-muted); }
  .welcome-input-row textarea::-webkit-scrollbar { display: none; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .suggestion-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .suggestion-chip:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(124,106,255,0.1);
  }

  /* Message bubbles */
  .message {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
  }

  .message.bot .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .message.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.65;
    position: relative;
  }

  .message.bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(124,106,255,0.3);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .bubble-time {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 6px;
    display: block;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 5px;
    padding: 14px 16px;
    align-items: center;
  }

  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Bottom input — hidden until first message is sent */
  .input-area {
    padding: 16px 0 20px;
    border-top: 1px solid var(--border);
    display: none;
  }

  .input-area.visible { display: block; }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'DM Mono', monospace;
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.5;
    min-height: 24px;
    max-height: 120px;
    overflow-y: auto;
    scrollbar-width: none;
  }

  textarea::placeholder { color: var(--text-muted); }
  textarea::-webkit-scrollbar { display: none; }

  .send-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: white;
  }

  .send-btn:hover { background: #9580ff; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--surface2); cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; }

  .input-hint {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 8px;
  }

  .error-bubble {
    background: rgba(255, 80, 80, 0.08);
    border: 1px solid rgba(255, 80, 80, 0.2);
    color: #ff8080;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>
</head>
<body>
<div class="layout">

  <header>
    <div class="header-left">
      <div class="avatar">S</div>
      <div class="header-info">
        <h1>Saravana Perumal R.</h1>
        <p>Data Scientist · AI Practitioner</p>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Online
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Hey, I'm Saravana</h2>

      <!-- Input box replaces the description paragraph -->
      <div class="welcome-input-wrap">
        <div class="welcome-input-row">
          <textarea
            id="welcomeInput"
            placeholder="Ask me anything about my experience, skills, projects, or background. I'll answer as myself."
            rows="1"
            onkeydown="handleWelcomeKey(event)"
            oninput="autoResizeEl(this)"
          ></textarea>
          <button class="send-btn" onclick="sendFromWelcome()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>

      <div class="suggestions">
        <button class="suggestion-chip" onclick="sendSuggestion(this)">What are your skills?</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">Tell me about your experience</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">What projects have you built?</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">What's your educational background?</button>
        <button class="suggestion-chip" onclick="sendSuggestion(this)">How can I contact you?</button>
      </div>
    </div>
  </div>

  <!-- Bottom input — appears after first message -->
  <div class="input-area" id="inputArea">
    <div class="input-row">
      <textarea
        id="input"
        placeholder="Ask me anything..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResizeEl(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
  </div>

</div>

<script>
  // ⚙️ CONFIG — change this URL when you deploy to Render
  const API_URL = "http://127.0.0.1:5000/chat";

  const messagesEl   = document.getElementById("messages");
  const inputEl      = document.getElementById("input");
  const sendBtn      = document.getElementById("sendBtn");
  const welcomeEl    = document.getElementById("welcome");
  const inputArea    = document.getElementById("inputArea");
  const welcomeInput = document.getElementById("welcomeInput");

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function autoResizeEl(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function handleWelcomeKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromWelcome(); }
  }

  function sendFromWelcome() {
    const text = welcomeInput.value.trim();
    if (!text) return;
    dispatchMessage(text);
  }

  function sendSuggestion(btn) {
    dispatchMessage(btn.textContent.trim());
  }

  function dispatchMessage(text) {
    // Remove welcome screen, show bottom input bar
    if (welcomeEl && welcomeEl.parentNode) {
      welcomeEl.remove();
      inputArea.classList.add('visible');
      setTimeout(() => inputEl.focus(), 50);
    }
    doSend(text);
  }

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    doSend(text);
  }

  function appendMessage(role, content, isError = false) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    const avatarText = role === 'bot' ? 'S' : 'You';
    const time = getTime();

    if (isError) {
      msg.innerHTML = `
        <div class="msg-avatar">${avatarText}</div>
        <div class="bubble">
          <div class="error-bubble">⚠️ ${content}</div>
          <span class="bubble-time">${time}</span>
        </div>`;
    } else {
      msg.innerHTML = `
        <div class="msg-avatar">${avatarText}</div>
        <div class="bubble">
          ${content}
          <span class="bubble-time">${time}</span>
        </div>`;
    }

    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'message bot';
    msg.id = 'typing';
    msg.innerHTML = `
      <div class="msg-avatar">S</div>
      <div class="bubble">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>`;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function doSend(text) {
    sendBtn.disabled = true;
    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      removeTyping();

      if (res.ok && data.response) {
        const formatted = data.response
          .split(/\n\n+/)
          .map(p => `<p style="margin-bottom:8px">${p.replace(/\n/g, '<br>')}</p>`)
          .join('');
        appendMessage('bot', formatted);
      } else {
        appendMessage('bot', data.error || 'Something went wrong.', true);
      }

    } catch (err) {
      removeTyping();
      appendMessage('bot', 'Could not reach the server. Make sure Flask is running.', true);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
